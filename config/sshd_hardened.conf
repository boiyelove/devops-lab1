# Hardened SSH configuration reference
# Your setup.sh should apply these settings to /etc/ssh/sshd_config
#
# Do not copy this file directly -- your script must programmatically
# set these values.

PasswordAuthentication no
PubkeyAuthentication yes
PermitRootLogin prohibit-password
MaxAuthTries 3
ClientAliveInterval 300
ClientAliveCountMax 2
X11Forwarding no
AllowAgentForwarding no
